            <h1>Welcome to the Admin Dashboard!</h1>

    <button id="logoutButton" class="btn log">Logout</button>

    <script type="module">
        // Import Firebase SDKs (same as your login script, but simplified if needed)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        // Your Firebase configuration (copy paste from your login script)
        const firebaseConfig = {
            apiKey: "AIzaSyAW-6NCS9L3QbQ56_uol3A6aQ_0j8kcmT8",
            authDomain: "cj-dev-site.firebaseapp.com",
            projectId: "cj-dev-site",
            storageBucket: "cj-dev-site.firebasestorage.app",
            messagingSenderId: "535562736903",
            appId: "1:535562736903:web:655fa7e0a3c72c76d761a2",
            measurementId: "G-VVK222WWD0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- Logout Functionality ---
        const logoutButton = document.getElementById('logoutButton');
        if (logoutButton) {
            logoutButton.addEventListener('click', async () => {
                try {
                    await signOut(auth);
                    console.log("User signed out successfully.");
                    window.location.href = "index.html"; // Redirect to your login page (or home page)
                } catch (error) {
                    console.error("Error signing out:", error);
                    alert("Error logging out: " + error.message);
                }
            });
        }

        // --- Auth State Protection for Dashboard ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in. You might want to check if this specific user
                // is authorized as an admin here, perhaps by checking their UID or custom claims.
                console.log("Admin dashboard accessed by:", user.email);
            } else {
                // User is signed out or not logged in, redirect to login page
                console.log("No user signed in. Redirecting to login.");
                window.location.href = "index.html"; // Redirect to your login page (e.g., index.html)
            }
        });
    </script>
